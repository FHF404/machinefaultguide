<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ site.Home.RelPermalink }}">Home</a>
  {{ if eq .Section "errors" }}
    <span>/</span><a href="{{ "/errors/" | relURL }}">Error Codes</a>
    {{ with .Params.brand }}<span>/</span><a href="{{ "/brands/" | relURL }}{{ . | urlize }}/">{{ . }}</a>{{ end }}
  {{ else if .IsPage }}
    <span>/</span><a href="{{ .CurrentSection.RelPermalink }}">{{ .CurrentSection.Title }}</a>
  {{ else if not .IsHome }}
    <span>/</span><span>{{ .Title }}</span>
  {{ end }}
</nav>
